name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PS4 and PS5 Payload SDKs
        run: |
          wget -q https://github.com/ps4-payload-dev/sdk/releases/latest/download/ps4-payload-sdk.zip
          wget -q https://github.com/ps5-payload-dev/sdk/releases/latest/download/ps5-payload-sdk.zip
          unzip -q ps4-payload-sdk.zip -d /opt
          unzip -q ps5-payload-sdk.zip -d /opt

      - name: Create bin directory
        run: mkdir -p bin

      - name: Build PS4 ELF
        run: make build-ps4
        env:
          PS4_PAYLOAD_SDK: /opt/ps4-payload-sdk

      - name: Build PS5 ELF
        run: make build-ps5
        env:
          PS5_PAYLOAD_SDK: /opt/ps5-payload-sdk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/np-restore-account-ps4.elf
            bin/np-restore-account-ps5.elf
